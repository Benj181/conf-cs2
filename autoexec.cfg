fps_max "360" // General
fps_max_ui "360"
cl_showloadout "1"
sensitivity "1.2"
cl_teamid_overhead_mode "3"
cl_use_opens_buy_menu "0"
r_fullscreen_gamma "2.2"
r_drawtracers_firstperson "1"
r_show_build_info "0"
volume "0.5"

cl_prefer_lefthanded "0"
viewmodel_fov "68"
viewmodel_presetpos "0"

viewmodel_offset_x "2.5"
viewmodel_offset_y "2"
viewmodel_offset_z "-1.5"

hud_showtargetid "0" // Corsshair 
cl_crosshairstyle "4"
cl_crosshairsize "1"
cl_crosshairthickness "1"
cl_crosshairgap "-4"
cl_crosshair_drawoutline "0"
cl_crosshairdot "0"
cl_crosshair_t "0"
cl_crosshairusealpha "1"
cl_crosshairalpha "255"
cl_crosshair_recoil "0"
cl_crosshairgap_useweaponvalue "0"
cl_crosshaircolor "4"
cl_crosshair_sniper_width "1"

bind "mwheeldown" "+jump" // General binds
bind "\" "toggleconsole"
bind "MOUSE5" "toggleradarscale"
bind "y" "messagemode2"
bind "ENTER" "messagemode"
bind "mouse4" "+voicerecord"
bind "t" "+spray_menu"
bind "q" "slot3; slot5"
bind "4" "slot3; slot6"
bind "x" "slot3; slot7"
bind "c" "slot3; slot8"
bind "v" "slot3; slot10"
bind "9" "slot3; slot9"
bind "h" "noclip"
bind "n" "sv_rethrow_last_grenade"

cl_hud_radar_scale "1.3" // Radar
cl_drawhud_force_radar "1"
cl_radar_scale "0.4"
cl_radar_always_centered "0"

bind "f1" "vote option1"
bind "f2" "vote option2"
bind "f3" "buy vesthelm; buy vest; buy smokegrenade; buy flashbang; buy incgrenade; buy molotov; buy defuser;"
bind "f4" "+nadething"
bind "f5" "+fw"
alias "+fw" "demo_timescale 4"
alias "-fw" "demo_timescale 1"
bind "f6" "demo_togglepause"
bind "f7" "exec cfgprac"
alias "+nadething" "host_timescale 10"
alias "-nadething" "host_timescale 1"


